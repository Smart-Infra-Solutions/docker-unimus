---
kind: pipeline
type: docker
name: Building..
node:
  drone: ch1
steps:
- name: build & push
  image: plugins/docker
  settings:
    repo: ch1ch1/unimus
    tags: [ "latest" ]
    username: ch1ch1
    password:
      from_secret: dockerhub_token
- name: notification
  image: plugins/webhook
  settings:
    urls:
      from_secret: webhookgotify
    content_type: application/json
    template: |
      {
       "message": "{{ repo.owner }} as updated {{ repo.name }} with {{ build.status }}.",
       "priority": 4,
       "title": "{{ repo.name }} build"
      }
  when:
    status: [success, failure]
---
kind: signature
hmac: a5ab8942d2e4ac179c41c153bb3c7df2b08294cc056025f92fe094958a2d4b4a

